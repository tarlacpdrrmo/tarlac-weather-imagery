<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPAC Satellite Loop | Tarlac PDRRMO</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #000000; 
            color: #ffffff; 
            text-align: center; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* The Classic Orange Header */
        .header { 
            background: #d9534f; 
            padding: 12px; 
            font-weight: bold; 
            font-size: 18px; 
            border-bottom: 2px solid #ffffff; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* The Gray Control Bar */
        .control-bar { 
            background: #e0e0e0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
            border-bottom: 1px solid #999;
        }
        
        .control-bar button { 
            padding: 6px 15px; 
            font-size: 14px; 
            cursor: pointer; 
            border: 1px solid #999; 
            background: #f8f8f8; 
            color: #333; 
            font-weight: bold; 
            border-radius: 3px; 
            transition: 0.1s;
        }
        
        .control-bar button:hover { 
            background: #d4d4d4; 
            border-color: #666;
        }

        .control-bar button:active {
            background: #bbb;
        }
        
        .control-bar select { 
            padding: 5px; 
            font-size: 14px; 
            font-weight: bold;
            border: 1px solid #999;
            border-radius: 3px;
        }
        
        .frame-counter { 
            font-size: 14px; 
            color: #aaaaaa; 
            margin: 15px 0; 
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .image-container { 
            flex-grow: 1;
            padding: 0 20px 20px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        
        #satellite-image { 
            max-width: 100%; 
            max-height: 75vh; 
            border: 1px solid #333; 
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
            /* Optional: Adds slight contrast to make clouds pop */
            filter: contrast(1.1) brightness(1.05); 
        }

        /* Status Indicator during load */
        #status-text {
            color: #d9534f;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">WPAC Regional Infrared Satellite Loop</div>
    
    <div class="control-bar">
        <button id="btn-first">|&lt; First</button>
        <button id="btn-prev">&lt; Prev</button>
        <button id="btn-play">Play</button>
        <button id="btn-stop">Stop</button>
        <button id="btn-next">Next &gt;</button>
        <button id="btn-last">Last &gt;|</button>
        
        <select id="speed-select">
            <option value="1200">Slow</option>
            <option value="600" selected>Normal</option>
            <option value="200">Fast</option>
        </select>
    </div>

    <div class="frame-counter" id="counter">
        <span id="status-text">Connecting to JMA Satellite Network...</span>
    </div>

    <div class="image-container">
        <img id="satellite-image" src="" alt="">
    </div>

    <script>
        let validFrames = [];
        let currentIndex = 0;
        let timer = null;
        let isPlaying = false;

        const imgElement = document.getElementById('satellite-image');
        const counterElement = document.getElementById('counter');
        const speedSelect = document.getElementById('speed-select');
        const playBtn = document.getElementById('btn-play');

        // 1. Generate the precise URLs for the WPAC Tile (0_0)
        function generateTimestamps() {
            let urlsToLoad = [];
            let now = new Date();
            
            // Offset by 35 minutes to ensure JMA has finished uploading the image
            now.setMinutes(now.getMinutes() - 35);
            now.setMinutes(Math.floor(now.getMinutes() / 10) * 10);
            now.setSeconds(0);

            // Fetch the last 15 frames (2.5 hours of footage)
            for (let i = 14; i >= 0; i--) {
                let d = new Date(now.getTime() - (i * 10 * 60000));
                
                let yyyy = d.getUTCFullYear();
                let mm = String(d.getUTCMonth() + 1).padStart(2, '0');
                let dd = String(d.getUTCDate()).padStart(2, '0');
                let hh = String(d.getUTCHours()).padStart(2, '0');
                let min = String(d.getUTCMinutes()).padStart(2, '0');

                // THE WPAC TRICK: 'INFRARED_FULL/2d/550' + tile '0_0'
                let url = `https://himawari8-dl.nict.go.jp/himawari8/img/INFRARED_FULL/2d/550/${yyyy}/${mm}/${dd}/${hh}${min}00_0_0.png`;
                
                let localTime = d.toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit' });
                urlsToLoad.push({ url: url, label: `FRAME: ${15-i}/15 | ${localTime} PST` });
            }
            return urlsToLoad;
        }

        // 2. Pre-fetch and cache the images
        function preloadImages() {
            let targets = generateTimestamps();
            let attempts = 0;

            targets.forEach(target => {
                let img = new Image();
                img.src = target.url;
                
                img.onload = function() {
                    validFrames.push(target);
                    checkIfDone();
                };
                
                img.onerror = function() {
                    checkIfDone(); // Ignore broken frames silently
                };
                
                function checkIfDone() {
                    attempts++;
                    // Keep them in chronological order
                    validFrames.sort((a, b) => a.url.localeCompare(b.url));
                    
                    if (attempts === targets.length) {
                        startDashboard();
                    }
                }
            });
        }
