<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Radar Loop | Tarlac PDRRMO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Operational Top Bar --- */
        .top-bar {
            background: #0f172a;
            border-bottom: 1px solid rgba(16, 185, 129, 0.2);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 1000;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .radar-icon { color: #10b981; font-size: 22px; animation: pulse-glowing 2s infinite ease-in-out; }
        
        @keyframes pulse-glowing { 
            0% { transform: scale(1); opacity: 0.8; } 
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 10px #10b981; } 
            100% { transform: scale(1); opacity: 0.8; } 
        }

        .title-block h1 { margin: 0; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #f1f5f9; }
        .title-block p { margin: 0; font-size: 10px; color: #10b981; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .status-block { display: flex; align-items: center; gap: 20px; }
        .live-indicator { 
            display: flex; align-items: center; gap: 8px; 
            background: rgba(16, 185, 129, 0.1); 
            border: 1px solid rgba(16, 185, 129, 0.3); 
            padding: 5px 14px; border-radius: 20px; 
            font-size: 10px; font-weight: 800; color: #10b981; 
            text-transform: uppercase; letter-spacing: 0.5px; 
        }

        /* --- Map Container --- */
        #map {
            flex-grow: 1;
            width: 100%;
            background: #020617;
            z-index: 1;
        }

        /* --- Floating Control Console --- */
        .radar-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            width: 90%;
            max-width: 600px;
        }

        .btn-play {
            background: #10b981; color: #0f172a; width: 45px; height: 45px; border-radius: 50%; 
            font-size: 16px; border: none; font-weight: 900; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); 
            cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center;
        }
        .btn-play:hover { background: #34d399; transform: scale(1.05); }

        .timeline-container { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .timestamp-display { font-family: monospace; font-size: 14px; font-weight: 800; color: #f8fafc; text-align: center; letter-spacing: 1px; }
        
        .timeline-slider {
            -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #1e293b; outline: none; cursor: pointer;
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; cursor: pointer;
        }

        /* Hide Leaflet Attribution for cleaner look */
        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <i class="fa-solid fa-cloud-showers-heavy radar-icon"></i>
            <div class="title-block">
                <h1>Regional Precipitation Radar</h1>
                <p>Tarlac PDRRMO | RainViewer API</p>
            </div>
        </div>
        <div class="status-block">
            <div class="live-indicator">LIVE TELEMETRY</div>
        </div>
    </div>

    <div id="map"></div>

    <div class="radar-controls">
        <button class="btn-play" id="playBtn" onclick="togglePlay()"><i class="fa-solid fa-pause"></i></button>
        <div class="timeline-container">
            <div class="timestamp-display" id="timestamp">Loading Radar Data...</div>
            <input type="range" class="timeline-slider" id="slider" min="0" max="10" value="0" oninput="manualSeek(this.value)">
        </div>
    </div>

    <script>
        // 1. Initialize Leaflet Map (Centered on Tarlac, zoomed to show Luzon)
        const map = L.map('map', { zoomControl: false }).setView([15.48, 120.59], 6);
        L.control.zoom({ position: 'topright' }).addTo(map);

        // 2. Add Dark Basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // 3. RainViewer API Engine
        let radarLayers = [];
        let timestamps = [];
        let currentFrame = 0;
        let animationTimer = null;
        let isPlaying = true;

        async function fetchRadarData() {
            try {
                // Get the latest weather map manifest from RainViewer
                const response = await fetch('https://api.rainviewer.com/public/weather-maps.json');
                const data = await response.json();
                
                const apiBaseUrl = data.host;
                timestamps = data.radar.past; // Gets the last ~10 frames of radar data

                // Configure the slider to match the number of frames
                document.getElementById('slider').max = timestamps.length - 1;

                // Build a Leaflet tile layer for each timestamp
                timestamps.forEach((frame, index) => {
                    // Path formatting: {host}{path}/256/{z}/{x}/{y}/2/1_1.png
                    // '2' is the color scheme, '1_1' smooths the radar edges
                    const layer = L.tileLayer(`${apiBaseUrl}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`, {
                        opacity: 0, // Hide all frames initially
                        zIndex: 100 + index
                    }).addTo(map);
                    
                    radarLayers.push(layer);
                });

                // Start the animation
                startAnimation();

            } catch (error) {
                console.error("Failed to load radar data:", error);
                document.getElementById('timestamp').innerText = "API Connection Failed";
            }
        }

        // 4. Animation Controller
        function showFrame(index) {
            // Hide all frames
            radarLayers.forEach(layer => layer.setOpacity(0));
            
            // Show the current frame (Opacity 0.8 so you can still see the map beneath it)
            radarLayers[index].setOpacity(0.8);
            
            // Update the UI Date/Time text
            const date = new Date(timestamps[index].time * 1000);
            const timeString = date.toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit' });
            const dateString = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            
            document.getElementById('timestamp').innerText = `${dateString} | ${timeString}`;
            document.getElementById('slider').value = index;
            currentFrame = index;
        }

        function nextFrame() {
            let next = currentFrame + 1;
            if (next >= radarLayers.length) next = 0; // Loop back to beginning
            showFrame(next);
        }

        function startAnimation() {
            if (animationTimer) clearInterval(animationTimer);
            animationTimer = setInterval(nextFrame, 600); // Speed: 600ms per frame
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
            isPlaying = true;
        }

        function stopAnimation() {
            if (animationTimer) clearInterval(animationTimer);
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-play"></i>';
            isPlaying = false;
        }

        // 5. User Interaction Buttons
        function togglePlay() {
            if (isPlaying) {
                stopAnimation();
            } else {
                startAnimation();
            }
        }

        function manualSeek(value) {
            stopAnimation();
            showFrame(parseInt(value));
        }

        // Initialize everything on load
        fetchRadarData();
    </script>
</body>
</html>
