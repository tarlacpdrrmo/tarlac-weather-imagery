<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrared Satellite Loop | Tarlac PDRRMO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; 
            color: #f8fafc;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Operational Top Bar --- */
        .top-bar {
            background: #0f172a;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .radar-icon { color: #38bdf8; font-size: 22px; animation: pulse-glowing 2s infinite ease-in-out; }
        @keyframes pulse-glowing { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 10px #38bdf8; } 100% { transform: scale(1); opacity: 0.8; } }

        .title-block h1 { margin: 0; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #f1f5f9; }
        .title-block p { margin: 0; font-size: 10px; color: #38bdf8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .status-block { display: flex; align-items: center; gap: 20px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; background: rgba(56, 189, 248, 0.08); border: 1px solid rgba(56, 189, 248, 0.3); padding: 5px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; }
        .live-dot { width: 6px; height: 6px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 8px #38bdf8; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .clock { font-family: monospace; font-size: 14px; font-weight: 700; color: #94a3b8; }

        /* --- Embed Container (Zero Margins) --- */
        .viewer-container {
            flex-grow: 1;
            width: 100%;
            position: relative;
            background: #000000;
            overflow: hidden; 
        }

        /* --- THE AGGRESSIVE CROP HACK --- */
        .iframe-crop {
            position: absolute;
            top: -65px;   /* Pushes Orange Box UP out of view */
            left: -15px;  /* Pushes left margin OUT of view */
            width: calc(100% + 30px);  /* Stretches right margin OUT of view */
            
            /* TO GET THEIR GREEN BOX BACK: Change 130px to 65px below */
            height: calc(100% + 130px); 
            
            border: none;
        }

        /* --- Custom UI Control Bar (Visual Only) --- */
        .custom-controls {
            background: #0f172a;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .ctrl-group { display: flex; align-items: center; gap: 15px; }

        .btn-ctrl {
            background: #1e293b; border: 1px solid rgba(255,255,255,0.05); color: #cbd5e1;
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        .btn-ctrl:hover { background: #334155; color: #38bdf8; border-color: rgba(56, 189, 248, 0.3); }
        
        .btn-play {
            background: #38bdf8; color: #0f172a; width: 45px; height: 45px; border-radius: 50%; 
            font-size: 16px; border: none; font-weight: 900; box-shadow: 0 0 12px rgba(56, 189, 248, 0.4); cursor: pointer; transition: 0.2s;
        }
        .btn-play:hover { background: #7dd3fc; transform: scale(1.05); }

        .timeline-track {
            flex-grow: 1; margin: 0 30px; height: 6px; background: #1e293b; border-radius: 3px; position: relative;
        }
        .timeline-fill {
            position: absolute; left: 0; top: 0; height: 100%; width: 40%; background: #38bdf8; border-radius: 3px; box-shadow: 0 0 10px #38bdf8;
        }
        .timeline-thumb {
            position: absolute; left: 40%; top: -4px; width: 14px; height: 14px; background: #fff; border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5); transform: translateX(-50%);
        }

        .speed-label { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 1px; }
        .speed-val { font-size: 12px; font-weight: 800; color: #f8fafc; background: #1e293b; padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <i class="fa-solid fa-satellite-dish radar-icon"></i>
            <div class="title-block">
                <h1>Western Pacific Infrared Loop</h1>
                <p>CyclonicWX Satellite Stream</p>
            </div>
        </div>
        <div class="status-block">
            <div class="live-indicator"><div class="live-dot"></div> Live Stream Connected</div>
            <div class="clock" id="live-clock">00:00:00</div>
        </div>
    </div>

    <div class="viewer-container">
        <iframe class="iframe-crop" src="https://cyclonicwx.com/floater/wpac/ir/" scrolling="no"></iframe>
    </div>

    <div class="custom-controls">
        <div class="ctrl-group">
            <button class="btn-ctrl" onclick="alert('CORS SECURITY BLOCK: Custom HTML buttons cannot control an external iframe. Use the native controls to play.')"><i class="fa-solid fa-backward-step"></i></button>
            <button class="btn-play" onclick="alert('CORS SECURITY BLOCK: Custom HTML buttons cannot control an external iframe. Use the native controls to play.')"><i class="fa-solid fa-play"></i></button>
            <button class="btn-ctrl" onclick="alert('CORS SECURITY BLOCK: Custom HTML buttons cannot control an external iframe. Use the native controls to play.')"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        
        <div class="timeline-track">
            <div class="timeline-fill"></div>
            <div class="timeline-thumb"></div>
        </div>

        <div class="ctrl-group">
            <span class="speed-label">SPEED</span>
            <div class="speed-val">1.0x</div>
        </div>
    </div>
    <script>
        // --- System Clock Implementation ---
        function updateOperationalClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            const dateString = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
            document.getElementById('live-clock').innerText = `${dateString} | ${timeString} PST`;
        }

        setInterval(updateOperationalClock, 1000);
        updateOperationalClock();
    </script>
</body>
</html>
