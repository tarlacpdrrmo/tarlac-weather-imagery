<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPAC Satellite Stream | Tarlac PDRRMO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #2b2b2b; 
            color: #f8fafc;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Operational Top Bar --- */
        .top-bar {
            background: #0f172a;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 50;
            position: relative;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .radar-icon { color: #38bdf8; font-size: 22px; animation: pulse-glowing 2s infinite ease-in-out; }
        @keyframes pulse-glowing { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 10px #38bdf8; } 100% { transform: scale(1); opacity: 0.8; } }

        .title-block h1 { margin: 0; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #f1f5f9; }
        .title-block p { margin: 0; font-size: 10px; color: #38bdf8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .status-block { display: flex; align-items: center; gap: 20px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; background: rgba(56, 189, 248, 0.08); border: 1px solid rgba(56, 189, 248, 0.3); padding: 5px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; }
        .live-dot { width: 6px; height: 6px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 8px #38bdf8; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .clock { font-family: monospace; font-size: 14px; font-weight: 700; color: #94a3b8; }

        /* --- VIEWER MAIN AREA --- */
        .viewer-container {
            flex-grow: 1;
            width: 100%;
            background: #303030; 
            position: relative;
            overflow: hidden; 
        }

        /* Tool Cursors */
        .viewer-container.tool-pan { cursor: grab; }
        .viewer-container.tool-pan.dragging { cursor: grabbing; }
        .viewer-container.tool-pointer { cursor: default; }

        /* --- THE PAN & ZOOM WRAPPER --- */
        .pan-zoom-container {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-origin: 0 0; 
        }

        /* --- THE IFRAME MANIPULATION --- */
        .iframe-crop {
            position: absolute;
            width: 1600px; 
            height: 1000px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.0);
            border: none;
        }

        /* Allow clicking iframe only in pointer mode */
        .viewer-container.tool-pan .iframe-crop { pointer-events: none; }
        .viewer-container.tool-pointer .iframe-crop { pointer-events: auto; }

        /* --- THE BOTTOM MASK --- */
        .bottom-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; 
            background: #303030; 
            z-index: 20;
            pointer-events: none; 
        }

        /* --- SIDEBAR TOOLBAR --- */
        .sidebar-toolbar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 60;
            background: rgba(15, 23, 42, 0.85); 
            border: 1px solid rgba(56, 189, 248, 0.2); 
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid transparent; 
            color: rgba(241, 245, 249, 0.6); 
            border-radius: 8px;
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease-out;
            font-size: 16px;
        }

        .tool-btn:hover {
            background: rgba(56, 189, 248, 0.1); 
            color: #38bdf8;
            transform: translateY(-1px);
        }

        .tool-btn:active {
            transform: scale(0.95);
        }

        /* Active Tool State */
        .tool-btn.active {
            background: rgba(56, 189, 248, 0.15);
            border-color: rgba(56, 189, 248, 0.4);
            color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.2);
        }

        .toolbar-divider {
            height: 1px;
            background: rgba(56, 189, 248, 0.2);
            margin: 2px 4px;
        }

        /* Reset Icon (Pulsing Halo) inside toolbar */
        .reset-icon-halo {
            width: 6px;
            height: 6px;
            background: rgba(241, 245, 249, 0.8);
            border-radius: 50%;
            position: relative;
            transition: all 0.25s ease-out;
        }
        
        .tool-btn:hover .reset-icon-halo {
            background: #38bdf8;
        }

        .reset-icon-halo::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 1px solid currentColor;
            border-radius: 50%;
            animation: radar-halo 1.5s infinite;
            opacity: 0;
        }
        
        @keyframes radar-halo {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            30% { opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <i class="fa-solid fa-satellite-dish radar-icon"></i>
            <div class="title-block">
                <h1>Tropical WPAC Infrared Stream</h1>
                <p>Tarlac PDRRMO | CyclonicWX Node</p>
            </div>
        </div>
        <div class="status-block">
            <div class="live-indicator"><div class="live-dot"></div> Live Connection</div>
            <div class="clock" id="live-clock">00:00:00</div>
        </div>
    </div>

    <!-- Defaulting to Pointer Tool -->
    <div class="viewer-container tool-pointer" id="viewer-container">
        
        <!-- SIDEBAR TOOLBAR -->
        <div class="sidebar-toolbar">
            <button class="tool-btn active" id="btn-pointer" title="Pointer Tool (Click Mode)">
                <i class="fa-solid fa-arrow-pointer"></i>
            </button>
            <button class="tool-btn" id="btn-pan" title="Pan Tool (Grab Map)">
                <i class="fa-solid fa-hand"></i>
            </button>
            
            <div class="toolbar-divider"></div>
            
            <button class="tool-btn" id="btn-reset" title="Reset View to Default">
                <div class="reset-icon-halo"></div>
            </button>
        </div>

        <div class="pan-zoom-container" id="pan-zoom-container">
            <iframe class="iframe-crop" src="https://cyclonicwx.com/floater/nwpac/ir/" scrolling="no"></iframe>
        </div>
        
        <div class="bottom-mask"></div>

    </div>

    <script>
        // System Clock
        function updateOperationalClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            const dateString = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
            document.getElementById('live-clock').innerText = `${dateString} | ${timeString} PST`;
        }
        setInterval(updateOperationalClock, 1000);
        updateOperationalClock();

        // --- View & Tool Logic ---
        const viewer = document.getElementById('viewer-container');
        const mapLayer = document.getElementById('pan-zoom-container');
        
        // Toolbar Buttons
        const btnPointer = document.getElementById('btn-pointer');
        const btnPan = document.getElementById('btn-pan');
        const btnReset = document.getElementById('btn-reset');

        // State Variables
        let currentTool = 'pointer'; // 'pointer' or 'pan'
        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isPanning = false;

        // --- Tool Switching Logic ---
        function setTool(tool) {
            currentTool = tool;
            
            // Toggle Active Classes on buttons
            btnPointer.classList.toggle('active', tool === 'pointer');
            btnPan.classList.toggle('active', tool === 'pan');

            // Toggle Viewer Classes for Cursor/Iframe states
            viewer.classList.remove('tool-pointer', 'tool-pan');
            viewer.classList.add(`tool-${tool}`);
        }

        btnPointer.addEventListener('click', () => setTool('pointer'));
        btnPan.addEventListener('click', () => setTool('pan'));

        // --- Zooming (Works regardless of tool) ---
        viewer.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            
            const xs = (e.clientX - pointX) / scale;
            const ys = (e.clientY - pointY) / scale;

            const delta = Math.sign(e.deltaY);
            if (delta > 0) {
                scale *= 0.9; 
            } else {
                scale *= 1.1; 
            }

            // Lock zoom out: Minimum scale is strictly 1
            scale = Math.min(Math.max(1, scale), 4);

            if (scale === 1) {
                // If fully zoomed out to default, snap coordinates back to dead center
                pointX = 0;
                pointY = 0;
            } else {
                pointX = e.clientX - xs * scale;
                pointY = e.clientY - ys * scale;
            }

            mapLayer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        });

        // --- Panning (Only works if currentTool === 'pan') ---
        viewer.addEventListener('mousedown', (e) => {
            if (currentTool !== 'pan') return; 
            
            // Prevent dragging the map away if we are fully zoomed out
            if (scale === 1) return;

            e.preventDefault();
            isPanning = true;
            viewer.classList.add('dragging'); 
            
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
        });

        viewer.addEventListener('mousemove', (e) => {
            if (!isPanning || currentTool !== 'pan') return;
            e.preventDefault();
            
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            
            mapLayer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        });

        const stopPanning = () => {
            isPanning = false;
            viewer.classList.remove('dragging');
        };

        viewer.addEventListener('mouseup', stopPanning);
        viewer.addEventListener('mouseleave', stopPanning);

        // --- Reset Logic ---
        btnReset.addEventListener('mousedown', (e) => { e.stopPropagation(); });
        btnReset.addEventListener('click', () => {
            scale = 1;
            pointX = 0;
            pointY = 0;

            mapLayer.style.transition = 'transform 0.35s cubic-bezier(0.22, 1, 0.36, 1)'; 
            mapLayer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;

            setTimeout(() => { mapLayer.style.transition = 'none'; }, 350);
        });

    </script>
</body>
</html>
