<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Loop Monitor | Tarlac PDRRMO</title>
    <style>
        body { 
            margin: 0; 
            font-family: Arial, sans-serif; 
            background: #000000; 
            color: #ffffff; 
            text-align: center; 
        }
        
        /* The Orange Header */
        .header { 
            background: #d9534f; 
            padding: 12px; 
            font-weight: bold; 
            font-size: 18px; 
            border-bottom: 2px solid #ffffff; 
            text-transform: uppercase;
        }
        
        /* The Gray Control Bar */
        .control-bar { 
            background: #e0e0e0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 5px; 
            flex-wrap: wrap; 
        }
        
        .control-bar button { 
            padding: 6px 15px; 
            font-size: 14px; 
            cursor: pointer; 
            border: 1px solid #999; 
            background: #f8f8f8; 
            color: #333; 
            font-weight: bold; 
            border-radius: 3px; 
        }
        
        .control-bar button:hover { 
            background: #d4d4d4; 
        }
        
        .control-bar select { 
            padding: 5px; 
            font-size: 14px; 
            font-weight: bold;
        }
        
        .frame-counter { 
            font-size: 14px; 
            color: #aaaaaa; 
            margin-top: 15px; 
            font-weight: bold;
        }

        .image-container { 
            margin-top: 15px; 
            padding: 0 20px;
        }
        
        #satellite-image { 
            max-width: 100%; 
            max-height: 75vh; 
            border: 1px solid #444; 
        }
    </style>
</head>
<body>

    <div class="header">WPAC Regional Infrared Satellite Loop</div>
    
    <div class="control-bar">
        <button id="btn-first">|&lt; First</button>
        <button id="btn-prev">&lt; Prev</button>
        <button id="btn-play">Play</button>
        <button id="btn-stop">Stop</button>
        <button id="btn-next">Next &gt;</button>
        <button id="btn-last">Last &gt;|</button>
        
        <select id="speed-select">
            <option value="1000">Slow</option>
            <option value="500" selected>Normal</option>
            <option value="200">Fast</option>
        </select>
    </div>

    <div class="frame-counter" id="counter">Frame: 1 / 4</div>

    <div class="image-container">
        <img id="satellite-image" src="" alt="Satellite Frame">
    </div>

    <script>
        // ==========================================================
        // THE IMAGE ARRAY
        // Currently loaded with historical Typhoon Haiyan frames.
        // During a real storm, replace these URLs with the latest 
        // raw image links from NOAA, PAGASA, or JMA.
        // ==========================================================
        const frames = [
            "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Haiyan_2013-11-07_0530Z.jpg/800px-Haiyan_2013-11-07_0530Z.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Haiyan_2013-11-07_0930Z.jpg/800px-Haiyan_2013-11-07_0930Z.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Haiyan_2013-11-07_1330Z.jpg/800px-Haiyan_2013-11-07_1330Z.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Haiyan_2013-11-07_2330Z.jpg/800px-Haiyan_2013-11-07_2330Z.jpg"
        ];

        let currentIndex = 0;
        let timer = null;

        const imgElement = document.getElementById('satellite-image');
        const counterElement = document.getElementById('counter');
        const speedSelect = document.getElementById('speed-select');

        // Preload images silently in the background so the animation doesn't blink or stutter
        frames.forEach(src => {
            const img = new Image();
            img.src = src;
        });

        // Function to update the screen
        function updateDisplay() {
            imgElement.src = frames[currentIndex];
            counterElement.innerText = `Frame: ${currentIndex + 1} / ${frames.length}`;
        }

        // Playback Functions
        function nextFrame() {
            currentIndex = (currentIndex + 1) % frames.length;
            updateDisplay();
        }

        function prevFrame() {
            currentIndex = (currentIndex - 1 + frames.length) % frames.length;
            updateDisplay();
        }

        function playLoop() {
            stopLoop(); // Prevent multiple timers from overlapping
            timer = setInterval(nextFrame, parseInt(speedSelect.value));
        }

        function stopLoop() {
            if (timer) clearInterval(timer);
        }

        // Connect the HTML buttons to the Javascript functions
        document.getElementById('btn-play').addEventListener('click', playLoop);
        document.getElementById('btn-stop').addEventListener('click', stopLoop);
        
        document.getElementById('btn-next').addEventListener('click', () => { 
            stopLoop(); nextFrame(); 
        });
        
        document.getElementById('btn-prev').addEventListener('click', () => { 
            stopLoop(); prevFrame(); 
        });
        
        document.getElementById('btn-first').addEventListener('click', () => { 
            stopLoop(); currentIndex = 0; updateDisplay(); 
        });
        
        document.getElementById('btn-last').addEventListener('click', () => { 
            stopLoop(); currentIndex = frames.length - 1; updateDisplay(); 
        });
        
        // Update speed immediately if the user changes the dropdown while playing
        speedSelect.addEventListener('change', () => {
            if (timer) playLoop(); 
        });

        // Initialize the very first frame on load
        updateDisplay();
        playLoop();
    </script>
</body>
</html>
