<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPAC Satellite Stream | Tarlac PDRRMO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        body, html { 
            margin: 0; padding: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: #2b2b2b; 
            color: #f8fafc;
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Operational Top Bar --- */
        .top-bar {
            background: #0f172a;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            z-index: 50;
            position: relative;
        }

        .brand-container { display: flex; align-items: center; gap: 15px; }
        .radar-icon { color: #38bdf8; font-size: 22px; animation: pulse-glowing 2s infinite ease-in-out; }
        @keyframes pulse-glowing { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 10px #38bdf8; } 100% { transform: scale(1); opacity: 0.8; } }

        .title-block h1 { margin: 0; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #f1f5f9; }
        .title-block p { margin: 0; font-size: 10px; color: #38bdf8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .status-block { display: flex; align-items: center; gap: 20px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; background: rgba(56, 189, 248, 0.08); border: 1px solid rgba(56, 189, 248, 0.3); padding: 5px 14px; border-radius: 20px; font-size: 10px; font-weight: 800; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.5px; }
        .live-dot { width: 6px; height: 6px; background: #38bdf8; border-radius: 50%; box-shadow: 0 0 8px #38bdf8; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .clock { font-family: monospace; font-size: 14px; font-weight: 700; color: #94a3b8; }

        /* --- THE CLIPPING MASK --- */
        .viewer-container {
            flex-grow: 1;
            width: 100%;
            background: #303030; 
            position: relative;
            overflow: hidden; 
            cursor: grab; /* Adds the open hand cursor */
        }
        
        .viewer-container.dragging {
            cursor: grabbing; /* Changes to closed fist when actively dragging */
        }

        /* --- THE PAN & ZOOM WRAPPER --- */
        .pan-zoom-container {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-origin: 0 0; /* Crucial for calculating mouse wheel zoom accurately */
        }

        /* --- THE IFRAME MANIPULATION --- */
        .iframe-crop {
            position: absolute;
            width: 1600px; 
            height: 1000px;
            top: 50%;
            left: 50%;
            transform: translate(-40%, -50%) scale(1.0);
            border: none;
            /* Prevents the iframe from stealing our mouse clicks */
            pointer-events: none; 
        }

        /* --- THE BOTTOM MASK --- */
        .bottom-mask {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px; 
            background: #303030; 
            z-index: 20;
            pointer-events: none; /* Ensures we can still scroll if the mouse is over the mask */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <i class="fa-solid fa-satellite-dish radar-icon"></i>
            <div class="title-block">
                <h1>Tropical WPAC Infrared Stream</h1>
                <p>Tarlac PDRRMO | CyclonicWX Node</p>
            </div>
        </div>
        <div class="status-block">
            <div class="live-indicator"><div class="live-dot"></div> Live Connection</div>
            <div class="clock" id="live-clock">00:00:00</div>
        </div>
    </div>

    <div class="viewer-container" id="viewer-container">
        
        <div class="pan-zoom-container" id="pan-zoom-container">
            <iframe class="iframe-crop" src="https://cyclonicwx.com/floater/nwpac/ir/" scrolling="no"></iframe>
        </div>
        
        <div class="bottom-mask"></div>
    </div>

    <script>
        // System Clock
        function updateOperationalClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour12: false });
            const dateString = now.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
            document.getElementById('live-clock').innerText = `${dateString} | ${timeString} PST`;
        }
        setInterval(updateOperationalClock, 1000);
        updateOperationalClock();

        // Pan and Zoom Logic
        const viewer = document.getElementById('viewer-container');
        const mapLayer = document.getElementById('pan-zoom-container');

        let scale = 1;
        let pointX = 0;
        let pointY = 0;
        let startX = 0;
        let startY = 0;
        let isPanning = false;

        // 1. Zoom with Mouse Wheel
        viewer.addEventListener('wheel', (e) => {
            e.preventDefault(); // Prevents the whole webpage from scrolling
            
            // Calculate mouse position relative to the current scale
            const xs = (e.clientX - pointX) / scale;
            const ys = (e.clientY - pointY) / scale;

            // Determine zoom direction (in or out)
            const delta = Math.sign(e.deltaY);
            if (delta > 0) {
                scale *= 0.9; // Zoom out
            } else {
                scale *= 1.1; // Zoom in
            }

            // Restrict zoom limits (don't zoom out too far, don't zoom in too tight)
            scale = Math.min(Math.max(0.5, scale), 4);

            // Re-adjust the coordinates to zoom exactly where the mouse pointer is
            pointX = e.clientX - xs * scale;
            pointY = e.clientY - ys * scale;

            mapLayer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        });

        // 2. Pan Map Start (Mouse Down)
        viewer.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isPanning = true;
            viewer.classList.add('dragging'); // Triggers the CSS grabbing fist
            
            // Record where the user grabbed the map
            startX = e.clientX - pointX;
            startY = e.clientY - pointY;
        });

        // 3. Pan Map Moving (Mouse Move)
        viewer.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            
            // Calculate new position
            pointX = e.clientX - startX;
            pointY = e.clientY - startY;
            
            mapLayer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
        });

        // 4. Pan Map End (Mouse Up or Leaving map area)
        viewer.addEventListener('mouseup', () => {
            isPanning = false;
            viewer.classList.remove('dragging');
        });
        
        viewer.addEventListener('mouseleave', () => {
            isPanning = false;
            viewer.classList.remove('dragging');
        });
    </script>
</body>
</html>
